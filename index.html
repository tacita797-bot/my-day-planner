<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif;background:#f4f4f4;color:#111;font-size:14px;}

/* ── Setup ── */
#setup{min-height:100vh;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.setup-title{font-size:24px;font-weight:700;margin-bottom:6px;}
.setup-title span{color:#E07B2E;}
.setup-sub{font-size:13px;color:#888;margin-bottom:32px;}
.setup-label{font-size:12px;font-weight:700;color:#555;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;}
.setup-section{width:100%;max-width:360px;margin-bottom:24px;}
.ls-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ls-btn{padding:12px 6px;border:2px solid #e0e0e0;border-radius:12px;background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:600;transition:all .15s;}
.ls-btn .ls-ico{font-size:22px;display:block;margin-bottom:4px;}
.ls-btn.sel{border-color:#E07B2E;background:#fff8f3;color:#E07B2E;}
.time-pick{width:100%;padding:12px 14px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;font-weight:600;outline:none;text-align:center;}
.time-pick:focus{border-color:#E07B2E;}
.start-btn{width:100%;max-width:360px;padding:14px;background:#E07B2E;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;}
.start-btn:hover{opacity:.9;}

/* ── Main App ── */
#main{display:none;}
.hdr{background:#fff;border-bottom:1px solid #e0e0e0;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;}
.appname{font-size:15px;font-weight:700;}.appname em{font-style:normal;color:#E07B2E;}
.hdr-right{text-align:right;}
.clk{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.dt{font-size:10px;color:#888;margin-top:1px;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);background:#e0e0e0;gap:1px;border-bottom:1px solid #e0e0e0;}
.st{background:#f4f4f4;padding:8px 4px;text-align:center;}
.sv{font-size:13px;font-weight:700;}
.sl{font-size:10px;color:#888;}

/* ── Schedule rows ── */
.shdr{padding:6px 14px;color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
.row{display:flex;gap:10px;padding:10px 14px;border-bottom:1px solid #eee;background:#fff;align-items:center;cursor:pointer;user-select:none;transition:background .1s;}
.row:hover{background:#fafafa;}
.row.now{background:#fffaf7;}
.row.active{background:#fff8f3;}
.rtime{font-size:11px;color:#888;width:38px;flex-shrink:0;font-variant-numeric:tabular-nums;}
.rico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.rinfo{flex:1;min-width:0;}
.rtit{font-size:13px;font-weight:700;margin-bottom:1px;}
.rsub{font-size:11px;color:#888;}
.rarr{font-size:18px;color:#ccc;transition:transform .2s;flex-shrink:0;}
.row.active .rarr{transform:rotate(90deg);color:#E07B2E;}
.now-tag{font-size:9px;background:#C0392B;color:#fff;padding:1px 6px;border-radius:8px;font-weight:700;margin-left:5px;vertical-align:middle;}

/* ── Panel ── */
.panel{max-height:0;overflow:hidden;transition:max-height .3s ease;background:#fafafa;border-bottom:1px solid #eee;}
.panel.open{max-height:700px;}
.panel-inner{padding:14px;}
.panel-title{font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px;}

/* Panel components */
.p-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.p-label{font-size:12px;color:#555;min-width:60px;}
.p-input{flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;}
.p-input:focus{border-color:#E07B2E;}
.p-btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;}
.p-btn.primary{background:#E07B2E;color:#fff;}
.p-btn.sec{background:#f0f0f0;color:#333;}
.p-btn.green{background:#1E8449;color:#fff;}
.p-btn.blue{background:#2563EB;color:#fff;}
.p-btn.red{background:#C0392B;color:#fff;}
.p-btn:hover{opacity:.88;}

/* Task list */
.task-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px;}
.task-item{display:flex;align-items:center;gap:8px;}
.task-chk{width:19px;height:19px;border:2px solid #ccc;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.task-chk.done{background:#1E8449;border-color:#1E8449;color:#fff;font-size:11px;}
.task-txt{font-size:13px;flex:1;}
.task-txt.done{text-decoration:line-through;color:#aaa;}
.task-del{font-size:16px;color:#ccc;cursor:pointer;flex-shrink:0;}
.task-del:hover{color:#e74c3c;}
.add-task-row{display:flex;gap:6px;}
.add-task-input{flex:1;padding:8px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;outline:none;}
.add-task-input:focus{border-color:#E07B2E;}

/* Meal / Camera */
.cam-area{border:2px dashed #ddd;border-radius:12px;padding:20px;text-align:center;cursor:pointer;margin-bottom:10px;transition:border-color .15s;}
.cam-area:hover{border-color:#E07B2E;}
.cam-area input{display:none;}
.cam-preview{width:100%;border-radius:10px;margin-bottom:10px;display:none;}
.ai-result{background:#e8f5e9;border-radius:10px;padding:10px 12px;margin-bottom:8px;display:none;}
.ai-result .ar-title{font-size:11px;font-weight:700;color:#1E8449;margin-bottom:6px;}
.ai-result .ar-food{font-size:13px;font-weight:700;margin-bottom:2px;}
.ai-result .ar-cal{font-size:12px;color:#555;}
.ai-result .ar-comment{font-size:11px;color:#1E8449;margin-top:4px;}
.cal-bar-wrap{margin-top:8px;}
.cal-bar-label{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:4px;}
.cal-bar{height:7px;background:#eee;border-radius:4px;overflow:hidden;}
.cal-fill{height:100%;background:#1E8449;border-radius:4px;transition:width .5s;}
.analyzing{text-align:center;padding:16px;color:#888;font-size:13px;display:none;}

/* Mood buttons */
.mood-row{display:flex;gap:6px;margin-bottom:10px;}
.mood-btn{font-size:20px;background:none;border:2px solid #e0e0e0;border-radius:9px;padding:3px 7px;cursor:pointer;}
.mood-btn.sel{border-color:#6C3483;background:#f5eeff;}
.diary-area{width:100%;height:90px;border:1px solid #ddd;border-radius:9px;padding:9px 11px;font-size:13px;font-family:inherit;color:#111;background:#fff;resize:none;outline:none;line-height:1.6;margin-bottom:8px;}

/* Music player */
.music-player{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:10px;border:1px solid #eee;margin-bottom:8px;}
.music-ico{width:38px;height:38px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.music-info{flex:1;}
.music-title{font-size:13px;font-weight:700;}
.music-artist{font-size:11px;color:#888;}
.music-ctrl{display:flex;gap:6px;align-items:center;}
.mc-btn{background:none;border:none;cursor:pointer;font-size:18px;}
.mc-play{width:32px;height:32px;background:#6C3483;color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.music-prog{height:3px;background:#eee;border-radius:2px;margin-top:8px;}
.music-prog-fill{height:100%;width:35%;background:#6C3483;border-radius:2px;}

/* Exercise */
.ex-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.ex-chip{padding:6px 12px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;}
.ex-chip.sel{border-color:#1E8449;background:#e8f5e9;color:#1E8449;font-weight:700;}

/* Bottom nav */
.bnav{border-top:1px solid #e0e0e0;background:#fff;display:flex;padding:8px 0 14px;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:2px 0;}
.ni .nii{font-size:22px;color:#ccc;}
.ni .nil{font-size:10px;color:#ccc;}
.ni.on .nii,.ni.on .nil{color:#E07B2E;font-weight:700;}

/* Google card */
.g-card{margin:8px 12px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:10px 12px;}
.g-row{display:flex;align-items:center;gap:10px;}
.g-ico{width:32px;height:32px;border-radius:50%;background:#4285f4;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;flex-shrink:0;}
.g-ico.on{background:#34a853;}
.g-info{flex:1;}
.g-title{font-size:12px;font-weight:700;}
.g-sub{font-size:11px;color:#888;}
.g-btn{padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;border:none;cursor:pointer;background:#4285f4;color:#fff;white-space:nowrap;}
.g-btn.on{background:#f0f0f0;color:#333;}

/* Divider */
.divider{height:8px;background:#f0f0f0;}

/* Settings gear */
.settings-btn{position:fixed;bottom:80px;right:14px;width:42px;height:42px;border-radius:50%;background:#fff;border:1px solid #ddd;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:15;box-shadow:0 2px 8px rgba(0,0,0,.1);}

@keyframes spin{to{transform:rotate(360deg);}}
.spinning{animation:spin 1s linear infinite;display:inline-block;}
</style>

// ══ Utilities ══
function toTime(min){ const h=Math.floor(min/60)%24,m=min%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
function today(){ const n=new Date(); return n.getFullYear()+'-'+(n.getMonth()+1)+'-'+n.getDate(); }
function saveTasks(){ localStorage.setItem('dp_tasks', JSON.stringify(tasks)); }
function saveMeals(){ localStorage.setItem('dp_meals', JSON.stringify(meals)); updateCalStat(); }
function saveDiary(){ localStorage.setItem('dp_diary', JSON.stringify(diaryLog)); }

function selLS(btn){ document.querySelectorAll('.ls-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel'); }

function saveAndStart(){
  const ls = document.querySelector('.ls-btn.sel')?.dataset.v;
  const wt = document.getElementById('wake-time').value;
  if(!ls) return alert('라이프스타일을 선택해주세요');
  if(!wt) return alert('기상 시간을 선택해주세요');
  settings = { lifestyle: ls, wakeTime: wt };
  localStorage.setItem('dp_settings', JSON.stringify(settings));
  initApp();
}

// ══ App Init ══
function initApp(){
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  document.getElementById('reset-btn').style.display = 'flex';
  document.getElementById('lifestyle-tag').textContent = settings.lifestyle + ' · 기상 ' + settings.wakeTime;
  renderSchedule();
  tick(); setInterval(tick, 1000);
  updateNow(); setInterval(updateNow, 60000);
  updateTaskStat(); updateCalStat();
}

// ══ Schedule Render ══
function renderSchedule(){
  const [wh, wm] = settings.wakeTime.split(':').map(Number);
  const wakeMin = wh*60 + wm;
  const items = SCH[settings.lifestyle] || SCH['직장인'];
  const container = document.getElementById('schedule');
  container.innerHTML = '';
  let lastSec = null;

  items.forEach(item => {
    const timeMin = wakeMin + item.off;
    const timeStr = toTime(timeMin);

    if(item.sec && item.sec !== lastSec){
      lastSec = item.sec;
      const sh = document.createElement('div');
      sh.className = 'shdr';
      sh.style.background = item.sc;
      sh.textContent = item.sec + '  ' + timeStr + '~';
      container.appendChild(sh);
    }

    const row = document.createElement('div');
    row.className = 'row';
    row.dataset.id = item.id;
    row.dataset.min = timeMin;
    row.innerHTML = `
      <div class="rtime">${timeStr}</div>
      <div class="rico" style="background:${item.bg}">${item.ico}</div>
      <div class="rinfo">
        <div class="rtit">${item.t}</div>
        <div class="rsub">${item.s}</div>
      </div>
      <div class="rarr">›</div>`;
    container.appendChild(row);

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = '<div class="panel-inner">'+buildPanel(item, timeStr)+'</div>';
    container.appendChild(panel);

    row.addEventListener('click', ()=>{
      const isOpen = panel.classList.contains('open');
      document.querySelectorAll('.panel.open').forEach(p=>p.classList.remove('open'));
      document.querySelectorAll('.row.active').forEach(r=>r.classList.remove('active'));
      if(!isOpen){ panel.classList.add('open'); row.classList.add('active'); }
    });
    panel.addEventListener('click', e=>e.stopPropagation());

    // 패널 이벤트 등록
    setTimeout(()=>setupPanelEvents(panel, item), 0);
  });
}

// ══ Panel Events ══
function setupPanelEvents(panel, item){
  // Meal photo
  if(item.type === 'meal'){
    const fileInput = panel.querySelector(`#file-${item.id}`);
    if(fileInput){
      fileInput.addEventListener('change', (e)=>{
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev)=>{
          const prev = panel.querySelector(`#prev-${item.id}`);
          if(prev){ prev.src = ev.target.result; prev.style.display = 'block'; }
          analyzeMeal(ev.target.result.split(',')[1], file.type, item.id);
        };
        reader.readAsDataURL(file);
      });
    }
  }
  // Tasks
  if(item.type === 'work') renderTasks(item.id);
}

// ══ Task Functions ══
function renderTasks(blockId){
  const list = document.getElementById(`tlist-${blockId}`);
  if(!list) return;
  const blockTasks = tasks.filter(t=>t.block===blockId || !t.block);
  list.innerHTML = blockTasks.map((t,i)=>`
    <div class="task-item">
      <div class="task-chk ${t.done?'done':''}" onclick="toggleTask(${t.id})">
        ${t.done?'✓':''}
      </div>
      <span class="task-txt ${t.done?'done':''}">${t.text}</span>
      <span class="task-del" onclick="deleteTask(${t.id})">✕</span>
    </div>`).join('');
  updateTaskStat();
}

function addTask(blockId){
  const input = document.getElementById(`tinput-${blockId}`);
  if(!input || !input.value.trim()) return;
  const task = { id: Date.now(), text: input.value.trim(), done: false, block: blockId, date: today() };
  tasks.push(task);
  saveTasks();
  input.value = '';
  renderTasks(blockId);
}

function toggleTask(id){
  const t = tasks.find(t=>t.id===id);
  if(t){ t.done = !t.done; saveTasks(); }
  document.querySelectorAll('.panel.open').forEach(p=>{
    const blockId = p.closest('[data-id]')?.previousElementSibling?.dataset.id;
    if(blockId) renderTasks(blockId);
  });
}

function deleteTask(id){
  tasks = tasks.filter(t=>t.id!==id);
  saveTasks();
  document.querySelectorAll('.panel.open').forEach(p=>{
    const row = p.previousElementSibling;
    if(row) renderTasks(row.dataset.id);
  });
}

function updateTaskStat(){
  const done = tasks.filter(t=>t.done).length;
  document.getElementById('task-stat').textContent = done+'/'+tasks.length;
}

// ══ Meal AI Analysis ══
async function analyzeMeal(base64, mimeType, blockId){
  const analyzing = document.getElementById(`analyzing-${blockId}`);
  const result = document.getElementById(`result-${blockId}`);
  if(analyzing) analyzing.style.display = 'block';
  if(result) result.style.display = 'none';

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:500,
        messages:[{
          role:'user',
          content:[
            {type:'image', source:{type:'base64', media_type:mimeType, data:base64}},
            {type:'text', text:'이 음식 사진을 분석해서 JSON으로만 응답해. 마크다운 없이 순수 JSON만: {"food_name":"음식이름","total_calories":숫자,"detail":"단백질/탄수화물/지방 간략히","health_tip":"건강 조언 한줄"}'}
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.filter(b=>b.type==='text').map(b=>b.text).join('') || '';
    const parsed = JSON.parse(text.match(/\{[\s\S]*\}/)?.[0] || '{}');

    if(analyzing) analyzing.style.display = 'none';
    if(result) result.style.display = 'block';
    const foodEl = document.getElementById(`r-food-${blockId}`);
    const calEl = document.getElementById(`r-cal-${blockId}`);
    const comEl = document.getElementById(`r-comment-${blockId}`);
    if(foodEl) foodEl.textContent = parsed.food_name || '음식';
    if(calEl) calEl.textContent = (parsed.total_calories||0) + ' kcal · ' + (parsed.detail||'');
    if(comEl) comEl.textContent = parsed.health_tip || '';

    // 칼로리 기록
    const cal = parsed.total_calories || 0;
    meals.push({ time: new Date().toISOString(), block: blockId, name: parsed.food_name, calories: cal });
    saveMeals();

  }catch(e){
    if(analyzing) analyzing.style.display = 'none';
    if(result){ result.style.display = 'block'; }
    const foodEl = document.getElementById(`r-food-${blockId}`);
    if(foodEl){ foodEl.textContent = '분석 실패'; }
    const calEl = document.getElementById(`r-cal-${blockId}`);
    if(calEl){ calEl.textContent = '수동으로 입력해주세요'; }
  }
  updateCalDisplay(blockId);
}

function updateCalStat(){
  const todayMeals = meals.filter(m=>m.time?.startsWith(new Date().toISOString().slice(0,10)));
  const total = todayMeals.reduce((s,m)=>s+(m.calories||0),0);
  const el = document.getElementById('cal-stat');
  if(el) el.textContent = total.toLocaleString();
}

function updateCalDisplay(blockId){
  const todayMeals = meals.filter(m=>m.time?.startsWith(new Date().toISOString().slice(0,10)));
  const total = todayMeals.reduce((s,m)=>s+(m.calories||0),0);
  const goal = 1800;
  const pct = Math.min(100, Math.round(total/goal*100));
  const totalEl = document.getElementById(`cal-total-${blockId}`);
  const fillEl = document.getElementById(`cal-fill-${blockId}`);
  if(totalEl) totalEl.textContent = total + ' / ' + goal + ' kcal';
  if(fillEl) fillEl.style.width = pct + '%';
  updateCalStat();
}

  const text = document.getElementById('diary-text')?.value?.trim();
  if(!text) return;
  const mood = document.querySelector('.mood-btn.sel')?.textContent || '';
  diaryLog.push({ date: today(), mood, text });
  saveDiary();
  const btn = document.getElementById('diary-save');
  if(btn){ btn.textContent = '✅ 저장됨!'; btn.style.background='#1E8449'; setTimeout(()=>{ btn.textContent='💾 저장'; btn.style.background=''; },2000); }
}

function aiDraft(){
  sendPrompt('오늘 하루 일기 초안을 써줘. 오늘 날짜 기준으로, 주식 스크리너 작업과 하루 일과를 바탕으로 따뜻하고 간결하게 3~4문장으로.');
}

// ══ Exercise ══
function selEx(el){ document.querySelectorAll('.ex-chip').forEach(c=>c.classList.remove('sel')); el.classList.add('sel'); }

function saveExercise(blockId){
  const min = document.getElementById(`ex-min-${blockId}`)?.value;
  const type = document.querySelector('.ex-chip.sel')?.textContent || '운동';
  if(!min) return;
  const focusEl = document.getElementById('focus-stat');
  if(focusEl){ const cur = parseInt(focusEl.textContent)||0; focusEl.textContent = (cur + Math.round(parseInt(min)/60*10)/10)+'h'; }
  alert(`✅ ${type} ${min}분 기록됐어요!`);
}

// ══ Alarm ══
function saveAlarm(blockId){
  const newTime = document.getElementById(`alarm-time-${blockId}`)?.value;
  if(!newTime) return;
  settings.wakeTime = newTime;
  localStorage.setItem('dp_settings', JSON.stringify(settings));
  document.getElementById('lifestyle-tag').textContent = settings.lifestyle + ' · 기상 ' + newTime;
  renderSchedule();
  alert('✅ 기상 시간이 ' + newTime + '으로 변경됐어요!');
}

// ══ Music ══
let playing = {};
function togglePlay(id){
  playing[id] = !playing[id];
  const btn = document.getElementById(`mplay-${id}`);
  if(btn) btn.textContent = playing[id] ? '⏸' : '▶';
}

// ══ Now Highlight ══
function updateNow(){
  const nowMin = new Date().getHours()*60 + new Date().getMinutes();
  const rows = document.querySelectorAll('.row[data-min]');
  let curr = null;
  rows.forEach(r=>{ r.classList.remove('now'); const rm=parseInt(r.dataset.min); if(rm<=nowMin) curr=r; });
  if(curr){
    curr.classList.add('now');
    const tit = curr.querySelector('.rtit');
    if(tit && !tit.querySelector('.now-tag')){
      const tag = document.createElement('span');
      tag.className = 'now-tag'; tag.textContent = '지금';
      tit.appendChild(tag);
    }
  }
}

// ══ Clock ══
function tick(){
  const n=new Date(), d=['일','월','화','수','목','금','토'];
  const clk=document.getElementById('clk'); if(clk) clk.textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const cdt=document.getElementById('cdt'); if(cdt) cdt.textContent=(n.getMonth()+1)+'월 '+n.getDate()+'일 ('+d[n.getDay()]+')';
}

// ══ Google (demo) ══
function googleConnect(){
  const btn=document.getElementById('g-btn');
  const ico=document.getElementById('g-ico');
  const title=document.getElementById('g-title');
  const sub=document.getElementById('g-sub');
  if(btn.classList.contains('on')){
    btn.textContent='연결'; btn.classList.remove('on');
    ico.textContent='G'; ico.classList.remove('on');
    title.textContent='구글 계정 연결';
    sub.textContent='할일·일기가 구글 시트에 저장돼요';
    return;
  }
  btn.textContent='연결 중...'; btn.disabled=true;
  setTimeout(()=>{
    ico.textContent='✓'; ico.classList.add('on');
    title.textContent='연결됨';
    sub.textContent='✅ 구글 시트 동기화 완료';
    btn.textContent='해제'; btn.classList.add('on'); btn.disabled=false;
  },1200);
}

function nav(el){ document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on')); el.classList.add('on'); }
